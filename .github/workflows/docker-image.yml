name: Download Image from URL
on: 
  push:
    branches: [ "staging" ]
  pull_request:
    branches: [ "staging" ]
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Create image folder
      run: mkdir -p ./image

    - name: Download image
      uses: suisei-cn/actions-download-file@v1
      with:
        url: "https://imagefromci.com/image.jpg"
        target: ./image/image.jpg
